name: sync glue scripts to s3

on:
  push:
    branches: [feat/1-batch-ingestion-full-vs-incremental]
    paths: 
      - 'glue/**'
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: install aws cli (act only)
        if: ${{ env.ACT }}
        run: |
          curl -s "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
          unzip -q awscliv2.zip
          sudo ./aws/install
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - run: aws s3 sync glue/ s3://sh26-aws-ingestion-tf/1-batch-ingestion-full-vs-incremental/glue/scripts/
